name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native-helper

      - name: Run Rust tests
        run: cargo test --manifest-path native-helper/Cargo.toml

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Install build dependencies
        run: .venv/bin/pip install --upgrade pip maturin

      - name: Build native extension in-place
        run: .venv/bin/maturin develop --skip-install --manifest-path native-helper/Cargo.toml

      - name: Run Python binding tests
        run: .venv/bin/python -m unittest tests.test_python_bindings
